<div class="min-h-screen bg-gray-900 p-8 text-white">
  
  <div class="max-w-6xl mx-auto flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold">Gestión de Usuarios</h1>
    <button (click)="cerrarSesion()" class="bg-red-700 hover:bg-red-900 text-white font-bold py-2 px-4 rounded-md transition-colors">
      Cerrar Sesión
    </button>
    <button (click)="abrirModal()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition-colors">
      + Nuevo Usuario
    </button>
  </div>

  <div class="max-w-6xl mx-auto bg-gray-800 rounded-lg shadow-lg overflow-hidden">
    <table class="w-full text-left border-collapse">
      
      <thead>
        <tr class="bg-gray-700 text-gray-300 uppercase text-sm leading-normal">
          <th class="py-3 px-6 font-semibold">ID</th>
          <th class="py-3 px-6 font-semibold">Nombre</th>
          <th class="py-3 px-6 font-semibold">Correo</th>
          <th class="py-3 px-6 font-semibold text-center">Acciones</th>
        </tr>
      </thead>
      
      <tbody class="text-gray-300 text-sm">
        @for (usuario of usuarios; track usuario.id) {
            <tr class="border-b border-gray-700 hover:bg-gray-600 transition-colors">
              <td class="py-3 px-6 whitespace-nowrap">{{ usuario.id }}</td>
              <td class="py-3 px-6 font-medium text-white">{{ usuario.nombre }}</td>
              <td class="py-3 px-6">{{ usuario.correo }}</td>
              <td class="py-3 px-6 text-center flex justify-center space-x-2">
                <button (click)="abrirModal(usuario)" class="text-yellow-500 hover:text-yellow-400 font-semibold transition-colors">
                  Editar
                </button>
                <button (click)="eliminarUsuario(usuario)" class="text-red-500 hover:text-red-400 font-semibold transition-colors">
                  Eliminar
                </button>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="5" class="py-8 text-center text-gray-500">
                No hay usuarios registrados aún.
              </td>
            </tr>
          }
      
      </tbody>
    </table>
  </div>
</div>

@if (modalAbierto) {
  <div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    
    <div class="bg-gray-800 rounded-xl shadow-2xl w-full max-w-md overflow-hidden border border-gray-700">
      
      <div class="flex justify-between items-center p-5 border-b border-gray-700 bg-gray-800/50">
        <h2 class="text-xl font-bold text-white">
          @if (usuarioSeleccionado) { Editar Usuario } @else { Nuevo Usuario }
        </h2>
        <button (click)="cerrarModal()" class="text-gray-400 hover:text-white text-2xl leading-none">&times;</button>
      </div>
      
      <div class="p-5">
        
        <app-modal 
          [usuarioAEditar]="usuarioSeleccionado"
          (usuarioGuardado)="guardarUsuario($event)"
          (cerrarModal)="cerrarModal()"
          >
        </app-modal>
        
      </div>
    </div>
  </div>
}
